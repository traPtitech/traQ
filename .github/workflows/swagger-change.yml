name: swagger-change

on:
  push:
    branches:
      - 'master'
    paths:
      - 'docs/v3-api.yaml'
      - '.github/workflows/swagger-change.yml'
  pull_request:
    paths:
      - 'docs/v3-api.yaml'
      - '.github/workflows/swagger-change.yml'

permissions:
  contents: read

jobs:
  spectral:
    name: Spectral
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run spectral
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            stoplight/spectral:6.15.1@sha256:b3d5a530f83c4a72df69e682c5ac928bc9821b5ca3c42529e81d926c80fa50ab \
            lint docs/v3-api.yaml --ruleset .spectral.yml --verbose
  node-traq:
    name: node-traq
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'traPtitech',
              repo: 'node-traq',
              workflow_id: 'release.yml',
              ref: 'master'
            })
  go-traq:
    name: go-traq
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'traPtitech',
              repo: 'go-traq',
              workflow_id: 'release.yaml',
              ref: 'master'
            })
  swift-traq:
    name: swift-traq
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'traPtitech',
              repo: 'swift-traq',
              workflow_id: 'release.yml',
              ref: 'main'
            })
  rust-traq:
    name: rust-traq
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'traPtitech',
              repo: 'rust-traq',
              workflow_id: 'regenerate.yml',
              ref: 'main'
            })
