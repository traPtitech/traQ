name: Renovate

on:
  # For manual dispatch
  workflow_dispatch:
    inputs:
      dryRun:
        description: Dry-Run
        default: "false"
        required: false
      logLevel:
        description: Log-Level
        default: debug
        required: false
  # For auto-merge - should exclude non-renovate branch dispatches in job definitions below
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  schedule:
    # 5 a.m. in JST(+9)
    - cron: "0 20 * * *"
  # For auto-merge and rebasing
  push:
    branches: ["master"]

permissions:
  contents: read

env:
  LOG_LEVEL: ${{ github.event.inputs.logLevel || 'debug' }}
  RENOVATE_DRY_RUN: ${{ github.event.inputs.dryRun || 'false' }}
  RENOVATE_CONFIG_FILE: .github/renovate-bot.json5

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    # Exclude dispatch from non-renovate checks
    if: ${{ !(github.event_name == 'workflow_run' && !startsWith(github.event.workflow_run.head_branch, 'renovate/')) }}
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Renovate
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        with:
          renovate-image: "ghcr.io/renovatebot/renovate"
          # renovate:image-tag-digest imageName=ghcr.io/renovatebot/renovate
          renovate-version: "43.261.4@sha256:adc66d8ffba5d835b9ef27768bd3176d07e7ea98c8dba274b07f511beea5fe81"
          configurationFile: "${{ env.RENOVATE_CONFIG_FILE }}"
          token: "${{ steps.generate-token.outputs.token }}"
